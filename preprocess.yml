name: Automate Data Preprocessing

on:
  push:
    paths:
      - 'namadataset_raw/**'
      - 'preprocessing/automate_Ridho.py'
  workflow_dispatch: 

jobs:
  preprocess_data:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn

      - name: Run Preprocessing Script
        run: |
          # Menjalankan script dari root repository
          python preprocessing/automate_Ridho.py

      - name: Commit and Push Processed Data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-preprocess: Update processed dataset"
          file_pattern: namadataset_preprocessing/**
